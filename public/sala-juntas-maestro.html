<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIAcademy • MAESTRO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f1724 0%, #1a2a3a 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .nav-bar {
            max-width: 1400px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.2);
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 24px; color: #ffd966; }
        .logo span:first-child { background: linear-gradient(135deg, #3b82f6, #1e40af); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; color: white; }
        .back-link { color: #88ccff; text-decoration: none; padding: 8px 20px; border-radius: 40px; background: rgba(255,255,255,0.1); }
        .codigo-display { background: #1e2b24; padding: 6px 16px; border-radius: 40px; font-family: monospace; font-size: 14px; color: #ffd966; }
        .meeting-layout { max-width: 1400px; margin: 0 auto; display: flex; gap: 20px; flex-wrap: wrap; }
        .pizarra-container { flex: 2; min-width: 500px; background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); border-radius: 32px; overflow: hidden; transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.6); }
        .pizarra-container.hidden { display: none; }
        .jitsi-container { flex: 1; min-width: 350px; background: #1e1e2e; border-radius: 32px; overflow: hidden; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.2); }
        .jitsi-header { padding: 16px 20px; background: rgba(0,0,0,0.5); color: white; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .jitsi-frame { flex: 1; min-height: 500px; background: #2d3e3a; }
        .controls-bar { padding: 16px; background: rgba(0,0,0,0.3); display: flex; gap: 12px; justify-content: center; }
        .btn-control { background: #4c9f70; border: none; padding: 8px 20px; border-radius: 40px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .toggle-switch { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.5); padding: 6px 16px; border-radius: 40px; }
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #e06c6c; transition: 0.3s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: 0.3s; border-radius: 50%; }
        input:checked + .slider { background-color: #4c9f70; }
        input:checked + .slider:before { transform: translateX(26px); }
        .info-sala { position: fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 8px 16px; border-radius: 40px; color: #88ccff; font-size: 12px; font-family: monospace; z-index: 1000; }
        @media (max-width: 900px) { .meeting-layout { flex-direction: column; } .pizarra-container { min-width: auto; } .jitsi-container { min-width: auto; } }
    </style>
    <script src='https://8x8.vc/vpaas-magic-cookie-b74fcf0dc97943ddad2f5fc49881f391/external_api.js'></script>
</head>
<body>
    <div class="nav-bar">
        <div class="logo"><span>AI</span><span>AIAcademy</span></div>
        <div class="codigo-display" id="codigoDisplay">🔄 Conectando...</div>
        <a href="index.html" class="back-link">← Salir</a>
    </div>

    <div class="meeting-layout">
        <div id="pizarraContainer" class="pizarra-container">
            <!-- MAESTRO: la pizarra se carga desde la ruta correcta -->
            <iframe id="pizarraFrame" src="maestro.html" style="width: 100%; height: 700px; border: none; display: block;" allow="camera; microphone; display-capture; fullscreen"></iframe>
        </div>

        <div class="jitsi-container">
            <div class="jitsi-header">
                <span>📹 Sala MAESTRO</span>
                <div class="toggle-switch">
                    <label>🎨 Pizarra</label>
                    <label class="switch"><input type="checkbox" id="pizarraToggle"><span class="slider"></span></label>
                </div>
            </div>
            <div id="jitsiFrame" class="jitsi-frame"></div>
            <div class="controls-bar"><button id="refreshJitsiBtn" class="btn-control">🔄 Recargar video</button></div>
        </div>
    </div>
    <div class="info-sala">👑 MAESTRO</div>

    <script>
        const API_KEY = 'vpaas-magic-cookie-b74fcf0dc97943ddad2f5fc49881f391';
        const pizarraToggle = document.getElementById('pizarraToggle');
        const pizarraContainer = document.getElementById('pizarraContainer');
        const codigoDisplay = document.getElementById('codigoDisplay');
        let salaId = null;
        let jitsiApi = null;

        // --- 1. WebSocket para obtener el código de sala ---
        const ws = new WebSocket(`wss://${window.location.host}`);
        ws.onopen = () => {
            ws.send(JSON.stringify({ tipo: 'identificar', rol: 'maestro' }));
            ws.send(JSON.stringify({ tipo: 'crear_sala' }));
        };
        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.tipo === 'sala_creada') {
                salaId = msg.salaId;
                codigoDisplay.innerHTML = `🔑 ${salaId} <span style="cursor:pointer;" onclick="navigator.clipboard.writeText('${salaId}')">📋</span>`;
                iniciarJitsi(salaId);
                
                // Enviar el código a la pizarra (iframe)
                const iframe = document.getElementById('pizarraFrame');
                iframe.contentWindow.postMessage({ type: 'sala_creada', salaId: salaId }, '*');
            }
        };

        // --- 2. Jitsi ---
        function iniciarJitsi(salaId) {
            const container = document.getElementById('jitsiFrame');
            container.innerHTML = '';
            const options = {
                roomName: `${API_KEY}/aia-sala-${salaId}`,
                width: '100%',
                height: '100%',
                parentNode: container,
                userInfo: { displayName: 'Maestro' },
                configOverwrite: { startWithVideoMuted: false, startWithAudioMuted: false },
                interfaceConfigOverwrite: { SHOW_JITSI_WATERMARK: false, SHOW_POWERED_BY: false }
            };
            try {
                jitsiApi = new JitsiMeetExternalAPI("8x8.vc", options);
            } catch(e) { container.innerHTML = '<div style="padding:20px;color:#ffaa66;">⚠️ Error Jitsi</div>'; }
        }

        // --- 3. Toggle pizarra ---
        pizarraToggle.addEventListener('change', (e) => {
            const visible = e.target.checked;
            if (visible) pizarraContainer.classList.remove('hidden');
            else pizarraContainer.classList.add('hidden');
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ tipo: 'accion', accion: 'toggle_pizarra', data: { visible } }));
            }
        });

        document.getElementById('refreshJitsiBtn').addEventListener('click', () => {
            if (jitsiApi) jitsiApi.dispose();
            if (salaId) iniciarJitsi(salaId);
        });
    </script>
</body>
</html>
