<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>👑 MAESTRO - Pizarra + Jitsi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1724;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo { font-size: 24px; font-weight: bold; color: #ffd966; }
        .codigo { background: #1e2b24; padding: 6px 16px; border-radius: 40px; font-family: monospace; color: #88ccff; }
        .back-link { color: #88ccff; text-decoration: none; padding: 6px 16px; border-radius: 40px; background: rgba(255,255,255,0.1); }
        .main-layout { display: flex; gap: 20px; flex-wrap: wrap; }
        .pizarra-area { flex: 2; min-width: 500px; background: rgba(255,255,255,0.1); border-radius: 32px; overflow: hidden; }
        .jitsi-area { flex: 1; min-width: 350px; background: #1e1e2e; border-radius: 32px; overflow: hidden; display: flex; flex-direction: column; }
        .jitsi-header { padding: 16px; background: rgba(0,0,0,0.5); color: white; display: flex; justify-content: space-between; align-items: center; }
        .toggle-switch { display: flex; align-items: center; gap: 12px; }
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #e06c6c; transition: 0.3s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: 0.3s; border-radius: 50%; }
        input:checked + .slider { background-color: #4c9f70; }
        input:checked + .slider:before { transform: translateX(26px); }
        .jitsi-frame { flex: 1; min-height: 500px; background: #2d3e3a; }
        .btn-control { background: #4c9f70; border: none; padding: 8px 16px; border-radius: 40px; cursor: pointer; color: white; margin: 12px; }
        .pizarra-frame { width: 100%; height: 700px; border: none; display: block; }
        .hidden { display: none; }
        @media (max-width: 900px) { .main-layout { flex-direction: column; } .pizarra-area { min-width: auto; } .jitsi-area { min-width: auto; } }
    </style>
    <script src='https://8x8.vc/vpaas-magic-cookie-b74fcf0dc97943ddad2f5fc49881f391/external_api.js'></script>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">👑 AIAcademy MAESTRO</div>
        <div class="codigo" id="codigoDisplay">🔄 Conectando...</div>
        <a href="index.html" class="back-link">← Salir</a>
    </div>
    <div class="main-layout">
        <div id="pizarraContainer" class="pizarra-area">
            <iframe id="pizarraFrame" class="pizarra-frame" src="public/maestro.html" allow="camera; microphone; display-capture; fullscreen"></iframe>
        </div>
        <div class="jitsi-area">
            <div class="jitsi-header">
                <span>📹 Videoconferencia</span>
                <div class="toggle-switch">
                    <label>🎨 Pizarra</label>
                    <label class="switch"><input type="checkbox" id="pizarraToggle"><span class="slider"></span></label>
                </div>
            </div>
            <div id="jitsiFrame" class="jitsi-frame"></div>
            <button id="refreshJitsiBtn" class="btn-control">🔄 Recargar video</button>
        </div>
    </div>
</div>

<script>
    const API_KEY = 'vpaas-magic-cookie-b74fcf0dc97943ddad2f5fc49881f391';
    const pizarraToggle = document.getElementById('pizarraToggle');
    const pizarraContainer = document.getElementById('pizarraContainer');
    const codigoDisplay = document.getElementById('codigoDisplay');
    let salaId = null;
    let jitsiApi = null;
    let ws = null;

    function conectarWS() {
        ws = new WebSocket(`wss://${window.location.host}`);
        ws.onopen = () => {
            ws.send(JSON.stringify({ tipo: 'identificar', rol: 'maestro' }));
            ws.send(JSON.stringify({ tipo: 'crear_sala' }));
        };
        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.tipo === 'sala_creada') {
                salaId = msg.salaId;
                codigoDisplay.innerHTML = `🔑 ${salaId} 📋`;
                codigoDisplay.onclick = () => navigator.clipboard.writeText(salaId);
                iniciarJitsi(salaId);
                const iframe = document.getElementById('pizarraFrame');
                iframe.contentWindow.postMessage({ type: 'sala_creada', salaId: salaId }, '*');
            }
        };
        ws.onclose = () => setTimeout(conectarWS, 3000);
    }

    function iniciarJitsi(salaId) {
        const container = document.getElementById('jitsiFrame');
        container.innerHTML = '';
        const options = {
            roomName: `${API_KEY}/aia-sala-${salaId}`,
            width: '100%', height: '100%', parentNode: container,
            userInfo: { displayName: 'Maestro' },
            configOverwrite: { startWithVideoMuted: false, startWithAudioMuted: false, disableDeepLinking: true },
            interfaceConfigOverwrite: { SHOW_JITSI_WATERMARK: false, SHOW_BRAND_WATERMARK: false }
        };
        try { jitsiApi = new JitsiMeetExternalAPI("8x8.vc", options); }
        catch(e) { console.error('Jitsi error'); }
    }

    pizarraToggle.addEventListener('change', (e) => {
        const visible = e.target.checked;
        if (visible) pizarraContainer.classList.remove('hidden');
        else pizarraContainer.classList.add('hidden');
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ tipo: 'accion', accion: 'toggle_pizarra', data: { visible } }));
        }
    });

    document.getElementById('refreshJitsiBtn').onclick = () => {
        if (jitsiApi) jitsiApi.dispose();
        if (salaId) iniciarJitsi(salaId);
    };

    conectarWS();
</script>
</body>
</html>
