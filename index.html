<!-- index.html - Landing page con dos accesos -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIAcademy • Formación en IA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f1724 0%, #1a2a3a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 {
            color: #ffd966;
            font-size: 2rem;
            margin-bottom: 16px;
        }
        p {
            color: #ccc;
            margin-bottom: 32px;
        }
        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            background: #ffd966;
            color: #2d2b1f;
            padding: 14px 28px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.2s;
            display: inline-block;
        }
        .btn:hover {
            background: #ffc107;
            transform: scale(1.02);
        }
        .btn-secondary {
            background: #4c9f70;
            color: white;
        }
        .btn-secondary:hover {
            background: #3d8a5e;
        }
        .demo-badge {
            margin-top: 32px;
            font-size: 0.7rem;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 AIAcademy</h1>
        <p>Formación profesional en Inteligencia Artificial</p>
        <div class="buttons">
            <a href="sala-juntas-maestro.html" class="btn">🎬 MAESTRO</a>
            <a href="sala-juntas-espectador.html" class="btn btn-secondary">👁️ ESPECTADOR</a>
        </div>
        <div class="demo-badge">Demo • Sala con videoconferencia + pizarra colaborativa</div>
    </div>
</body>
</html>
