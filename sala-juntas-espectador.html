<!-- sala-juntas-espectador.html - Recibe toggle del maestro -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIAcademy • Sala de Juntas (ESPECTADOR)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f1724 0%, #1a2a3a 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .nav-bar {
            max-width: 1400px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 24px;
            color: #ffd966;
        }
        .logo span:first-child {
            background: linear-gradient(135deg, #3b82f6, #1e40af);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: white;
        }
        .back-link {
            color: #88ccff;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 40px;
            background: rgba(255,255,255,0.1);
        }
        .meeting-layout {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .pizarra-container {
            flex: 2;
            min-width: 500px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.6);
        }
        .pizarra-container.hidden {
            display: none;
        }
        .jitsi-container {
            flex: 1;
            min-width: 350px;
            background: #1e1e2e;
            border-radius: 32px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .jitsi-header {
            padding: 16px 20px;
            background: rgba(0,0,0,0.5);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .jitsi-frame {
            flex: 1;
            min-height: 500px;
            background: #2d3e3a;
        }
        .controls-bar {
            padding: 16px;
            background: rgba(0,0,0,0.3);
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .btn-control {
            background: #4c9f70;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: 0.2s;
        }
        .status-text {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.5);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 12px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            box-shadow: 0 0 5px #4caf50;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }
        .info-sala {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 40px;
            color: #88ccff;
            font-size: 12px;
            font-family: monospace;
            z-index: 1000;
        }
        @media (max-width: 900px) {
            .meeting-layout {
                flex-direction: column;
            }
            .pizarra-container {
                min-width: auto;
            }
            .jitsi-container {
                min-width: auto;
            }
        }
    </style>
    <script src='https://8x8.vc/vpaas-magic-cookie-b74fcf0dc97943ddad2f5fc49881f391/external_api.js' async></script>
</head>
<body>
    <div class="nav-bar">
        <div class="logo">
            <span>AI</span>
            <span>AIAcademy</span>
        </div>
        <a href="index.html" class="back-link">← Salir</a>
    </div>
    
    <div class="meeting-layout">
        <div id="pizarraContainer" class="pizarra-container">
            <iframe 
                id="pizarraFrame"
                src="public/espectador.html" 
                style="width: 100%; height: 700px; border: none; display: block;"
                allow="camera; microphone; display-capture; fullscreen">
            </iframe>
        </div>
        
        <div class="jitsi-container">
            <div class="jitsi-header">
                <span>📹 Sala de Juntas</span>
                <div class="status-text">
                    <span class="status-dot"></span>
                    <span id="maestroStatus">Esperando maestro...</span>
                </div>
            </div>
            <div id="jitsiFrameContainer" class="jitsi-frame">
                <div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #888; background: #1e2b24;">
                    ⏳ Cargando videoconferencia...
                </div>
            </div>
            <div class="controls-bar">
                <button id="refreshJitsiBtn" class="btn-control">🔄 Recargar video</button>
            </div>
        </div>
    </div>
    
    <div class="info-sala" id="infoSala">
        👁️ ESPECTADOR • Modo lectura
    </div>

    <script>
        let ws = null;
        let pizarraVisible = true;
        const pizarraContainer = document.getElementById('pizarraContainer');
        const maestroStatusSpan = document.getElementById('maestroStatus');
        
        const roomName = "vpaas-magic-cookie-b74fcf0dc97943ddad2f5fc49881f391/aia-academy-sala";
        
        function conectarWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}`);
            
            ws.onopen = () => {
                console.log('🟢 WebSocket conectado (ESPECTADOR)');
                ws.send(JSON.stringify({ tipo: 'identificar', rol: 'espectador' }));
            };
            
            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                if (msg.tipo === 'accion' && msg.accion === 'toggle_pizarra') {
                    pizarraVisible = msg.data.visible;
                    if (pizarraVisible) {
                        pizarraContainer.classList.remove('hidden');
                        maestroStatusSpan.innerHTML = 'Pizarra activa';
                    } else {
                        pizarraContainer.classList.add('hidden');
                        maestroStatusSpan.innerHTML = 'Pizarra oculta por el maestro';
                    }
                    console.log('📥 Toggle recibido:', pizarraVisible);
                }
            };
            
            ws.onclose = () => {
                maestroStatusSpan.innerHTML = 'Maestro desconectado';
            };
        }
        
        let jitsiApi = null;
        const jitsiContainer = document.getElementById('jitsiFrameContainer');
        
        function initJitsi() {
            jitsiContainer.innerHTML = '';
            
            const options = {
                roomName: roomName,
                width: '100%',
                height: '100%',
                parentNode: jitsiContainer,
                userInfo: { displayName: 'Espectador' },
                configOverwrite: {
                    startWithVideoMuted: true,
                    startWithAudioMuted: true,
                    disableDeepLinking: true
                },
                interfaceConfigOverwrite: {
                    SHOW_JITSI_WATERMARK: false,
                    SHOW_BRAND_WATERMARK: false,
                    SHOW_POWERED_BY: false
                }
            };
            
            try {
                jitsiApi = new JitsiMeetExternalAPI("8x8.vc", options);
                console.log('✅ Jitsi inicializado (espectador)');
            } catch(e) {
                console.error('Error Jitsi:', e);
                jitsiContainer.innerHTML = '<div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #ffaa66; background: #1e2b24; text-align: center; padding: 20px;">⚠️ Error cargando videoconferencia</div>';
            }
        }
        
        document.getElementById('refreshJitsiBtn').addEventListener('click', () => {
            if (jitsiApi) jitsiApi.dispose();
            setTimeout(initJitsi, 500);
        });
        
        conectarWebSocket();
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => setTimeout(initJitsi, 500));
        } else {
            setTimeout(initJitsi, 500);
        }
    </script>
</body>
</html>
